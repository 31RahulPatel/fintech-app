# SonarCloud Configuration
# For SonarCloud integration with GitHub

sonar.projectKey=31RahulPatel_fintechapp
sonar.projectName=FintechOps
sonar.projectVersion=1.0.0
sonar.organization=31rahulpatel

# Sources
sonar.sources=frontend/src,services
sonar.exclusions=**/node_modules/**,**/coverage/**,**/build/**,**/dist/**,**/*.test.js,**/*.spec.js,**/migrations/**,**/__mocks__/**

# Testing & Coverage
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,services/*/coverage/lcov.info
sonar.testExecutionReportPaths=test-results/junit.xml

# Language & Encoding
sonar.sourceEncoding=UTF-8
sonar.language=js

# Code duplication
sonar.cpd.exclusions=**/node_modules/**,**/build/**,**/dist/**

# Encoding
sonar.host.url=https://sonarcloud.io
