apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fintechops-alb
  namespace: fintechops
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    alb.ingress.kubernetes.io/load-balancer-name: fintechops-alb
    alb.ingress.kubernetes.io/group.name: fintechops
    alb.ingress.kubernetes.io/tags: Environment=production,Application=fintechops,ManagedBy=kubernetes
spec:
  rules:
  - http:
      paths:
      # API Routes (must come before frontend catch-all)
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
      
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3002
      
      - path: /api/market
        pathType: Prefix
        backend:
          service:
            name: market-service
            port:
              number: 3004
      
      - path: /api/news
        pathType: Prefix
        backend:
          service:
            name: news-service
            port:
              number: 3005
      
      - path: /api/blog
        pathType: Prefix
        backend:
          service:
            name: blog-service
            port:
              number: 3006
      
      - path: /api/calculators
        pathType: Prefix
        backend:
          service:
            name: calculator-service
            port:
              number: 3007
      
      - path: /api/chat
        pathType: Prefix
        backend:
          service:
            name: chatbot-service
            port:
              number: 3008
      
      - path: /api/email
        pathType: Prefix
        backend:
          service:
            name: email-service
            port:
              number: 3009
      
      - path: /api/admin
        pathType: Prefix
        backend:
          service:
            name: admin-service
            port:
              number: 3010
      
      # API Gateway - handles routing to all services
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 3000
      
      # Frontend - catch all remaining routes (MUST BE LAST)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80