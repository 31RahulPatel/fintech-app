apiVersion: v1
kind: ConfigMap
metadata:
  name: fintechops-config
  namespace: fintechops
data:
  # Environment
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  
  # Service URLs (internal cluster communication)
  API_BASE_URL: "http://api-gateway:3000"
  FRONTEND_URL: "http://frontend:80"
  AUTH_SERVICE_URL: "http://auth-service:3001"
  USER_SERVICE_URL: "http://user-service:3002"
  MARKET_SERVICE_URL: "http://market-service:3004"
  NEWS_SERVICE_URL: "http://news-service:3005"
  BLOG_SERVICE_URL: "http://blog-service:3006"
  CALCULATOR_SERVICE_URL: "http://calculator-service:3007"
  CHATBOT_SERVICE_URL: "http://chatbot-service:3008"
  EMAIL_SERVICE_URL: "http://email-service:3009"
  ADMIN_SERVICE_URL: "http://admin-service:3010"
  
  # Database URLs (internal)
  MONGODB_HOST: "mongodb"
  MONGODB_PORT: "27017"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  
  # Application Settings
  JWT_EXPIRY: "24h"
  JWT_REFRESH_EXPIRY: "7d"
  CORS_ORIGIN: "*"
  RATE_LIMIT_WINDOW: "15"
  RATE_LIMIT_MAX: "100"